<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Bridge Demo</title>
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8ecf1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /*
     * Demo Card — absolute skeleton from DSL layoutStyle
     * root: FRAME "Demo Card" 360×200 fill #FFFFFF
     */
    .demo-card {
      position: relative;
      width: 360px;
      height: 200px;
      background: #FFFFFF;
      /* light professional desktop card shadow */
      box-shadow:
        0 1px 2px rgba(15, 23, 42, 0.06),
        0 8px 24px rgba(15, 23, 42, 0.10);
      overflow: hidden;
    }

    /* TEXT "Title" — x:24 y:24 w:300 h:32 */
    .demo-card__title {
      position: absolute;
      left: 24px;
      top: 24px;
      width: 300px;
      height: 32px;
      color: #0f172a;
      font-size: 20px;
      font-weight: 700;
      line-height: 32px;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* TEXT "Subtitle" — x:24 y:72 w:300 h:48 */
    .demo-card__subtitle {
      position: absolute;
      left: 24px;
      top: 72px;
      width: 300px;
      height: 48px;
      color: #475569;
      font-size: 14px;
      font-weight: 400;
      line-height: 24px;
      overflow: hidden;
    }

    /* FRAME "Button" — x:24 y:140 w:120 h:40 fill #3A90FF */
    .demo-card__button {
      position: absolute;
      left: 24px;
      top: 140px;
      width: 120px;
      height: 40px;
      background: #3A90FF;
      border: none;
      cursor: pointer;
      display: block;
      padding: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    .demo-card__button:hover {
      background: #2f7fe6;
    }

    .demo-card__button:active {
      background: #2770d0;
    }

    .demo-card__button:focus-visible {
      outline: 2px solid #3A90FF;
      outline-offset: 2px;
    }

    /* TEXT "CTA" — relative to button x:10 y:8 w:100 h:24 */
    .demo-card__cta {
      position: absolute;
      left: 10px;
      top: 8px;
      width: 100px;
      height: 24px;
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 600;
      line-height: 24px;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <!-- structureSiblingCount: single root card; no extra siblings -->
  <article class="demo-card" data-node-id="1:1" aria-label="Demo Card">
    <h1 class="demo-card__title" data-node-id="1:2">Offline Bridge Demo</h1>
    <p class="demo-card__subtitle" data-node-id="1:3">Design prompt works without MasterGo plan gates</p>
    <button type="button" class="demo-card__button" data-node-id="1:4">
      <span class="demo-card__cta" data-node-id="1:5">Get Started</span>
    </button>
  </article>
</body>
</html>
